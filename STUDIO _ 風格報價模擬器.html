<body class="bg-white text-gray-900 min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl font-light tracking-[0.2em] uppercase">Studio</h1>
            <div class="w-12 h-[1px] bg-black mx-auto mt-4"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <section class="space-y-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest mb-2">空間屬性</label>
                    <select id="spaceType" class="w-full p-3 monochrome-border outline-none bg-white">
                        <option value="new">新成屋</option>
                        <option value="old">老屋翻新</option>
                        <option value="commercial">商空/辦公空間</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest mb-2">坪數設定 (坪)</label>
                    <input type="number" id="sqFeet" value="20" class="w-full p-3 monochrome-border outline-none">
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest mb-2">裝修風格選擇</label>
                    <select id="styleSelection" class="w-full p-3 monochrome-border outline-none bg-white">
                        <option value="1.0">現代極簡 Modern Minimal</option>
                        <option value="1.1">日式北歐融合 Modern Japandi</option>
                        <option value="1.1">奶油風 Creamy Style</option>
                        <option value="1.2">侘寂風 Wabi-Sabi</option>
                        <option value="1.15">工業風 Industrial</option>
                        <option value="1.2">暗調現代 Moody Modern</option>
                        <option value="1.05">北歐風 Scandinavian</option>
                        <option value="1.3">新古典風 Neo Classic</option>
                    </select>
                </div>
            </section>

            <section class="monochrome-border p-8 bg-gray-50/50">
                <h2 class="text-xs uppercase tracking-widest mb-6">估算總覽</h2>
                <div class="space-y-4 text-sm" id="resultContainer">
                    <div class="flex justify-between">
                        <span>丈量提案費 <span class="text-[9px] text-gray-400 block">(簽約後可全額折抵)</span></span>
                        <span id="resMeasure">$30,000</span>
                    </div>
                    <div class="flex justify-between"><span>設計費用</span><span id="resDesign">$180,000</span></div>
                    <div class="flex justify-between"><span>工程造價 (預估)</span><span id="resProject">$1,400,000</span></div>
                    <div class="flex justify-between text-gray-500"><span>軟裝家具家電 (預估)</span><span id="resFurniture">$420,000</span></div>
                    <div class="flex justify-between text-gray-500 text-[10px]"><span>軟裝代購服務費 (5%)</span><span id="resService">$21,000</span></div>
                    <div class="w-full h-[1px] bg-gray-300 my-4"></div>
                    <div class="flex justify-between text-lg font-bold">
                        <span>預估總計 (不含丈量費)</span>
                        <span id="resTotal">$2,021,000</span>
                    </div>
                </div>
                <button onclick="copyToClipboard()" class="mt-8 w-full py-3 bg-black text-white text-xs uppercase tracking-widest hover:bg-gray-800 transition">複製報價資訊給設計師</button>
            </section>
        </div>
    </div>

    <script>
        function calculate() {
            const type = document.getElementById('spaceType').value;
            const size = parseFloat(document.getElementById('sqFeet').value) || 0;
            const styleMultiplier = parseFloat(document.getElementById('styleSelection').value);

            // 1. 丈量費
            let measure = (type === 'commercial' ? (size >= 40 ? 55000 : 35000) : (size >= 40 ? 50000 : 30000));
            
            // 2. 設計費
            let design = (type === 'new' ? 9000 : (type === 'old' ? 10000 : 8000)) * size;
            
            // 3. 工程造價
            let [minP, maxP] = (type === 'new') ? [50000, 90000] : (type === 'old' ? [120000, 180000] : [50000, 180000]);
            let projectAvg = ((minP + maxP) / 2) * size * styleMultiplier;

            // 4. 軟裝與家電計算
            let furniture = 0;
            let serviceFee = 0;
            if (type !== 'commercial') {
                furniture = projectAvg * 0.3; // 住宅為工程造價 30%
                serviceFee = furniture * 0.05;
                document.getElementById('resFurniture').innerText = `$${Math.round(furniture).toLocaleString()}`;
                document.getElementById('resService').innerText = `$${Math.round(serviceFee).toLocaleString()}`;
            } else {
                document.getElementById('resFurniture').innerText = "另購";
                document.getElementById('resService').innerText = "另購";
            }

            // 5. 總計 (不含丈量費)
            let totalWithoutMeasure = design + projectAvg + furniture + serviceFee;

            document.getElementById('resMeasure').innerText = `$${measure.toLocaleString()}`;
            document.getElementById('resDesign').innerText = `$${Math.round(design).toLocaleString()}`;
            document.getElementById('resProject').innerText = `$${Math.round(projectAvg).toLocaleString()}`;
            document.getElementById('resTotal').innerText = `$${Math.round(totalWithoutMeasure).toLocaleString()}`;
        }

        function copyToClipboard() {
            const styleSelect = document.getElementById('styleSelection');
            const styleText = styleSelect.options[styleSelect.selectedIndex].text;
            const isCommercial = document.getElementById('spaceType').value === 'commercial';
            
            const text = `設計師您好，我已透過模擬器進行初步估算：

[案件資訊]
空間類型：${document.getElementById('spaceType').options[document.getElementById('spaceType').selectedIndex].text}
坪數：${document.getElementById('sqFeet').value}坪
偏好風格：${styleText}

[費用細項]
丈量提案費 (簽約後可全額折抵)：${document.getElementById('resMeasure').innerText}
設計費用：${document.getElementById('resDesign').innerText}
工程造價 (預估)：${document.getElementById('resProject').innerText}
軟裝家具家電：${document.getElementById('resFurniture').innerText}
軟裝代購服務費 (5%)：${document.getElementById('resService').innerText}

預估總計 (不含丈量費)：${document.getElementById('resTotal').innerText}

[說明]
${isCommercial ? "軟裝家具家電：另購" : "軟裝代購服務：提供家具家電採購服務，收取設備費總額 × 5% 服務費。"}

請協助評估，謝謝！`;
            
            navigator.clipboard.writeText(text).then(() => alert("詳細報價摘要已複製，請貼上於 LINE 對話框發送。"));
        }

        document.querySelectorAll('select, input').forEach(el => el.addEventListener('change', calculate));
        calculate();
    </script>

</body></html>
